<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VeilRP Poster Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&family=Bebas+Neue&family=Exo+2:wght@300;700;800&family=Josefin+Sans:wght@300;400;700&family=Space+Grotesk:wght@300;400;700&family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@700&family=Abril+Fatface&family=Black+Han+Sans&family=Righteous&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0d;color:#ccc;font-family:'Space Grotesk',Arial,sans-serif;display:flex;gap:20px;padding:20px;min-height:100vh;align-items:flex-start;justify-content:center;}
.sidebar{width:320px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
h1{color:#e0e0e0;font-size:13px;letter-spacing:.15em;font-weight:400;padding:4px 0;}
.panel{background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:8px;}
.sec{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.2em;border-bottom:1px solid #222;padding-bottom:3px;margin-top:4px;}
.sec:first-child{margin-top:0;}
.cg{display:flex;flex-direction:column;gap:3px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
label{font-size:10px;color:#666;letter-spacing:.04em;text-transform:uppercase;}
input[type=text],select,textarea{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;color:#e0e0e0;padding:5px 8px;font-size:11px;width:100%;outline:none;font-family:'Space Grotesk',Arial,sans-serif;resize:none;}
input[type=color]{width:100%;height:26px;border:1px solid #2a2a2a;border-radius:4px;background:#0d0d0d;cursor:pointer;}
input[type=range]{width:100%;accent-color:#a855f7;}
input[type=file]{font-size:10px;color:#666;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:4px;padding:3px;width:100%;}
.tog{display:flex;align-items:center;gap:6px;}
.tog input{accent-color:#a855f7;width:13px;height:13px;}
.tog label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.04em;}
button{border:1px solid #333;color:#e0e0e0;padding:8px 14px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:500;letter-spacing:.06em;transition:all .15s;background:#1e1e1e;font-family:'Space Grotesk',Arial,sans-serif;width:100%;}
button:hover{background:#2a2a2a;border-color:#555;}
.bd{border-color:#3a1a4a;color:#d4a8ff;background:#130a1e;}
.bd:hover{background:#1e1030;}
.val{font-size:10px;color:#666;margin-left:3px;}
.slot-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.slot{background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:8px;display:flex;flex-direction:column;gap:4px;}
.slot-ph{width:100%;aspect-ratio:1;border-radius:6px;border:1px dashed #2a2a2a;display:flex;align-items:center;justify-content:center;font-size:18px;color:#333;margin-bottom:2px;}
.slot-prev{width:100%;aspect-ratio:1;border-radius:6px;border:1px solid #333;object-fit:cover;display:none;margin-bottom:2px;}
canvas{border:1px solid #222;border-radius:6px;display:block;flex-shrink:0;}
</style>
</head>
<body>
<div class="sidebar">
<h1>VEILRP — POSTER EDITOR</h1>

<div class="panel">
  <div class="sec">Background & Logo</div>
  <div class="cg"><label>Upload Background</label><input type="file" id="bgup" accept="image/*"></div>
  <div class="cg"><label>Logo Size <span class="val" id="lsv">160</span></label><input type="range" id="ls" min="60" max="280" value="160" oninput="lsv.textContent=this.value"></div>
  <div class="cg"><label>Logo Ring Color</label><input type="color" id="lrc" value="#c084fc"></div>
</div>

<div class="panel">
  <div class="sec">Hero Text</div>
  <div class="cg"><label>Line 1 (large)</label><input type="text" id="h1t" value="VEIL RP"></div>
  <div class="cg"><label>Line 2 (accent)</label><input type="text" id="h2t" value="Every Empire begins in the dark."></div>
  <div class="cg"><label>Hero Font</label>
    <select id="hf">
      <option value="Cinzel Decorative" selected>Cinzel Decorative (Elegant)</option>
      <option value="Cinzel">Cinzel (Classic)</option>
      <option value="Playfair Display">Playfair Display (Editorial)</option>
      <option value="Cormorant Garamond">Cormorant Garamond (Luxury)</option>
      <option value="Abril Fatface">Abril Fatface (Bold Serif)</option>
      <option value="Orbitron">Orbitron (Sci-Fi)</option>
      <option value="Black Han Sans">Black Han Sans (Impact)</option>
      <option value="Righteous">Righteous (Retro)</option>
      <option value="Bebas Neue">Bebas Neue (Street)</option>
      <option value="Rajdhani">Rajdhani (Sharp)</option>
    </select>
  </div>
  <div class="row2">
    <div class="cg"><label>Line 1 Color</label><input type="color" id="h1c" value="#ffffff"></div>
    <div class="cg"><label>Line 2 Color</label><input type="color" id="h2c" value="#c084fc"></div>
  </div>
</div>

<div class="panel">
  <div class="sec">Selling Tags Strip</div>
  <div class="cg"><label>Tag Text</label><textarea id="tagtxt" rows="2">LGBTQ+ &amp; Beginner Friendly  ·  Welcoming Community  ·  Be Whoever You Want</textarea></div>
  <div class="cg"><label>Tag Font</label>
    <select id="tagf">
      <option value="Josefin Sans" selected>Josefin Sans</option>
      <option value="Rajdhani">Rajdhani</option>
      <option value="Exo 2">Exo 2</option>
      <option value="Orbitron">Orbitron</option>
    </select>
  </div>
  <div class="cg"><label>Text Size <span class="val" id="tagsv">17</span></label><input type="range" id="tagsz" min="10" max="38" value="17" oninput="tagsv.textContent=this.value"></div>
  <div class="row2">
    <div class="cg"><label>Strip BG</label><input type="color" id="stripbg" value="#1a0a2e"></div>
    <div class="cg"><label>Strip Border</label><input type="color" id="stripbdr" value="#c084fc"></div>
  </div>
</div>

<div class="panel">
  <div class="sec">Picture Slots (4 boxes)</div>
  <div class="slot-grid">
    <div class="slot">
      <div class="sec" style="margin-top:0;">Slot 1</div>
      <div class="slot-ph" id="ph0">+</div><img class="slot-prev" id="prev0">
      <input type="file" accept="image/*" id="file0">
      <input type="text" id="slbl0" placeholder="Label">
      <input type="color" id="sring0" value="#c084fc">
    </div>
    <div class="slot">
      <div class="sec" style="margin-top:0;">Slot 2</div>
      <div class="slot-ph" id="ph1">+</div><img class="slot-prev" id="prev1">
      <input type="file" accept="image/*" id="file1">
      <input type="text" id="slbl1" placeholder="Label">
      <input type="color" id="sring1" value="#f472b6">
    </div>
    <div class="slot">
      <div class="sec" style="margin-top:0;">Slot 3</div>
      <div class="slot-ph" id="ph2">+</div><img class="slot-prev" id="prev2">
      <input type="file" accept="image/*" id="file2">
      <input type="text" id="slbl2" placeholder="Label">
      <input type="color" id="sring2" value="#818cf8">
    </div>
    <div class="slot">
      <div class="sec" style="margin-top:0;">Slot 4</div>
      <div class="slot-ph" id="ph3">+</div><img class="slot-prev" id="prev3">
      <input type="file" accept="image/*" id="file3">
      <input type="text" id="slbl3" placeholder="Label">
      <input type="color" id="sring3" value="#e879f9">
    </div>
  </div>
  <div class="cg"><label>Box Size <span class="val" id="bszv">145</span></label><input type="range" id="bsz" min="80" max="280" value="145" oninput="bszv.textContent=this.value"></div>
  <div class="cg"><label>Label Font</label>
    <select id="lblf">
      <option value="Rajdhani" selected>Rajdhani</option>
      <option value="Josefin Sans">Josefin Sans</option>
      <option value="Orbitron">Orbitron</option>
      <option value="Exo 2">Exo 2</option>
    </select>
  </div>
</div>

<div class="panel">
  <div class="sec">Discord CTA</div>
  <div class="cg"><label>Button Text</label><input type="text" id="ctabtn" value="JOIN NOW!"></div>
  <div class="cg"><label>Discord Link</label><input type="text" id="ctalnk" value="discord.gg/veilrp"></div>
  <div class="tog"><input type="checkbox" id="showdc" checked><label for="showdc">Show Discord Icon</label></div>
</div>

<div class="panel">
  <div class="sec">Colors & Style</div>
  <div class="row2">
    <div class="cg"><label>Neon 1</label><input type="color" id="gc" value="#c084fc"></div>
    <div class="cg"><label>Neon 2</label><input type="color" id="gc2" value="#f472b6"></div>
  </div>
  <div class="cg"><label>BG Brightness <span class="val" id="bbv">55</span>%</label><input type="range" id="bb" min="10" max="100" value="55" oninput="bbv.textContent=this.value"></div>
  <div class="cg"><label>BG Blur <span class="val" id="blrv">2</span>px</label><input type="range" id="blr" min="0" max="12" value="2" oninput="blrv.textContent=this.value"></div>
</div>

<button onclick="render()">&#9654; Update Preview</button>
<button class="bd" onclick="dl()">&#8595; Download PNG (800x1120)</button>
</div>

<canvas id="ad" width="800" height="1120" style="width:400px;height:560px;"></canvas>

for(var _i=0;_i<4;_i++){
  (function(i){
    document.getElementById("file"+i).onchange=function(){
      var f=this.files[0];if(!f)return;

      r.onload=function(x){
        var img=new Image();

          slotImgs[i]=img;
          document.getElementById("ph"+i).style.display="none";
          var pv=document.getElementById("prev"+i);

      };

    };
  })(_i);
}

function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function coverRRect(ctx,img,x,y,w,h,r){
  ctx.save();rrect(ctx,x,y,w,h,r);ctx.clip();
  var sc=Math.max(w/img.width,h/img.height);
  var sw=img.width*sc,sh=img.height*sc;
  ctx.drawImage(img,x+(w-sw)/2,y+(h-sh)/2,sw,sh);
  ctx.restore();
}

function coverCircle(ctx,img,cx,cy,r){
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.clip();
  var sc=Math.max(r*2/img.width,r*2/img.height);
  var sw=img.width*sc,sh=img.height*sc;
  ctx.drawImage(img,cx-sw/2,cy-sh/2,sw,sh);
  ctx.restore();
}

function drawCornerBrackets(ctx,gc,gc2){
  var cm=18,cl=36,lw=2;
  ctx.save();
  [[cm,cm,1,1,gc],[W-cm,cm,-1,1,gc2],[cm,H-cm,1,-1,gc2],[W-cm,H-cm,-1,-1,gc]].forEach(function(p){
    var col="rgb("+p[4]+")";
    ctx.strokeStyle=col;ctx.shadowColor=col;ctx.shadowBlur=10;ctx.lineWidth=lw;
    ctx.beginPath();ctx.moveTo(p[0]+p[2]*cl,p[1]);ctx.lineTo(p[0],p[1]);ctx.lineTo(p[0],p[1]+p[3]*cl);ctx.stroke();
  });
  ctx.restore();
}

  var gc2=h2r(document.getElementById("gc2").value);
  var lrc=h2r(document.getElementById("lrc").value);
  var logoSz=parseInt(document.getElementById("ls").value);
  var hf=document.getElementById("hf").value;
  var h1t=document.getElementById("h1t").value;
  var h2t=document.getElementById("h2t").value;
  var h1c=h2r(document.getElementById("h1c").value);
  var h2c=h2r(document.getElementById("h2c").value);
  var tagf=document.getElementById("tagf").value;
  var tagtxt=document.getElementById("tagtxt").value;
  var tagsz=parseInt(document.getElementById("tagsz").value);
  var stripbg=h2r(document.getElementById("stripbg").value);
  var stripbdr=h2r(document.getElementById("stripbdr").value);
  var bsz=parseInt(document.getElementById("bsz").value);
  var lblf=document.getElementById("lblf").value;
  var ctabtn=document.getElementById("ctabtn").value;
  var ctalnk=document.getElementById("ctalnk").value;
  var showdc=document.getElementById("showdc").checked;

  ctx.clearRect(0,0,W,H);

  // BG
  ctx.save();
  var pad=blr*2;
  if(blr>0) ctx.filter="brightness("+br+") saturate(1.1) blur("+blr+"px)";
  else ctx.filter="brightness("+br+") saturate(1.1)";
  ctx.drawImage(bgImg,-pad,-pad,W+pad*2,H+pad*2);
  ctx.restore();

  ctx.fillStyle="rgba(4,1,12,0.55)";ctx.fillRect(0,0,W,H);
  var gBot=ctx.createLinearGradient(0,H*0.25,0,H);
  gBot.addColorStop(0,"rgba(4,1,12,0)");gBot.addColorStop(0.4,"rgba(4,1,12,0.55)");gBot.addColorStop(1,"rgba(4,1,12,0.92)");
  ctx.fillStyle=gBot;ctx.fillRect(0,0,W,H);

  var bloom=ctx.createRadialGradient(W/2,H*0.18,0,W/2,H*0.18,H*0.55);
  bloom.addColorStop(0,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.12)");
  bloom.addColorStop(0.5,"rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.05)");
  bloom.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=bloom;ctx.fillRect(0,0,W,H);

  var vigL=ctx.createLinearGradient(0,0,W*0.25,0);
  vigL.addColorStop(0,"rgba(0,0,0,0.5)");vigL.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=vigL;ctx.fillRect(0,0,W*0.25,H);
  var vigR=ctx.createLinearGradient(W,0,W*0.75,0);
  vigR.addColorStop(0,"rgba(0,0,0,0.5)");vigR.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=vigR;ctx.fillRect(W*0.75,0,W*0.25,H);

  // Outer frame
  ctx.save();
  rrect(ctx,10,10,W-20,H-20,16);
  ctx.strokeStyle="rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.5)";
  ctx.lineWidth=2;ctx.shadowColor="rgb("+gc+")";ctx.shadowBlur=18;ctx.stroke();
  rrect(ctx,15,15,W-30,H-30,14);
  ctx.strokeStyle="rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.2)";
  ctx.lineWidth=1;ctx.shadowBlur=8;ctx.stroke();
  ctx.restore();

  // LOGO CIRCLE
  var lcr=logoSz/2;
  var lcx=W/2,lcy=80+lcr;

  // Bloom
  ctx.save();
  var lglow=ctx.createRadialGradient(lcx,lcy,0,lcx,lcy,lcr*2.2);
  lglow.addColorStop(0,"rgba("+lrc[0]+","+lrc[1]+","+lrc[2]+",0.22)");
  lglow.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle=lglow;ctx.fillRect(lcx-lcr*2.5,lcy-lcr*2.5,lcr*5,lcr*5);ctx.restore();

  // Static neon rings
  [lcr*0.12+12,lcr*0.06+6].forEach(function(off,ri){
    ctx.save();
    ctx.beginPath();ctx.arc(lcx,lcy,lcr+off,0,Math.PI*2);
    ctx.strokeStyle="rgba("+lrc[0]+","+lrc[1]+","+lrc[2]+","+(ri===0?0.3:0.55)+")";
    ctx.lineWidth=ri===0?1:1.5;
    ctx.shadowColor="rgb("+lrc+")";ctx.shadowBlur=16;ctx.stroke();ctx.restore();
  });

  // Dark fill
  ctx.save();ctx.beginPath();ctx.arc(lcx,lcy,lcr,0,Math.PI*2);
  ctx.fillStyle="rgba(8,3,20,0.85)";ctx.fill();ctx.restore();

  // Logo image
  if(logoReady) coverCircle(ctx,logoImg,lcx,lcy,lcr);

  // Border
  ctx.save();ctx.beginPath();ctx.arc(lcx,lcy,lcr,0,Math.PI*2);
  ctx.strokeStyle="rgba("+lrc[0]+","+lrc[1]+","+lrc[2]+",0.9)";
  ctx.lineWidth=2;ctx.shadowColor="rgb("+lrc+")";ctx.shadowBlur=20;ctx.stroke();ctx.restore();

  // Shimmer arc
  ctx.save();
  var shimGrad=ctx.createLinearGradient(lcx-lcr,lcy,lcx+lcr,lcy);
  shimGrad.addColorStop(0,"rgba(255,255,255,0)");shimGrad.addColorStop(0.5,"rgba(255,255,255,0.22)");shimGrad.addColorStop(1,"rgba(255,255,255,0)");
  ctx.strokeStyle=shimGrad;ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(lcx,lcy,lcr-1,-Math.PI*0.85,-Math.PI*0.15);ctx.stroke();ctx.restore();

  // HERO TEXT
  var heroY=lcy+lcr+68;

  ctx.save();
  ctx.font="900 86px '"+hf+"',serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.shadowColor="rgba("+h1c[0]+","+h1c[1]+","+h1c[2]+",0.8)";ctx.shadowBlur=30;
  ctx.fillStyle="rgba("+h1c[0]+","+h1c[1]+","+h1c[2]+",0.25)";ctx.fillText(h1t,W/2,heroY);
  ctx.shadowBlur=12;ctx.fillStyle="rgb("+h1c+")";ctx.fillText(h1t,W/2,heroY);
  ctx.restore();

  var h2y=heroY+68;
  ctx.save();
  ctx.font="300 italic 28px '"+hf+"',serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.shadowColor="rgb("+h2c+")";ctx.shadowBlur=20;
  ctx.fillStyle="rgba("+h2c[0]+","+h2c[1]+","+h2c[2]+",0.35)";ctx.fillText(h2t,W/2,h2y);
  ctx.shadowBlur=8;ctx.fillStyle="rgb("+h2c+")";ctx.fillText(h2t,W/2,h2y);
  ctx.restore();

  // Divider 1
  var div1Y=h2y+42;
  ctx.save();
  var dg=ctx.createLinearGradient(40,0,W-40,0);
  dg.addColorStop(0,"rgba(0,0,0,0)");dg.addColorStop(0.15,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.7)");
  dg.addColorStop(0.5,"rgba(255,255,255,0.9)");dg.addColorStop(0.85,"rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.7)");
  dg.addColorStop(1,"rgba(0,0,0,0)");
  ctx.strokeStyle=dg;ctx.lineWidth=1;ctx.shadowColor="rgb("+gc+")";ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(40,div1Y);ctx.lineTo(W-40,div1Y);ctx.stroke();ctx.restore();

  // SELLING TAGS STRIP - height scales with font size
  var stripY=div1Y+16;
  var stripH=Math.max(54, tagsz*3.2);
  var stripX=28,stripW=W-56;
  ctx.save();
  rrect(ctx,stripX,stripY,stripW,stripH,10);
  ctx.fillStyle="rgba("+stripbg[0]+","+stripbg[1]+","+stripbg[2]+",0.85)";ctx.fill();
  ctx.strokeStyle="rgba("+stripbdr[0]+","+stripbdr[1]+","+stripbdr[2]+",0.7)";
  ctx.lineWidth=1.5;ctx.shadowColor="rgb("+stripbdr+")";ctx.shadowBlur=12;ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.font="300 "+tagsz+"px '"+tagf+"',sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  var tg=ctx.createLinearGradient(stripX,0,stripX+stripW,0);
  tg.addColorStop(0,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.9)");
  tg.addColorStop(0.4,"rgba(255,235,255,1)");
  tg.addColorStop(0.6,"rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",1)");
  tg.addColorStop(1,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.9)");
  ctx.fillStyle=tg;
  ctx.fillText(tagtxt,W/2,stripY+stripH/2);
  ctx.restore();

  // PICTURE SLOTS GRID
  var slotZoneY=stripY+stripH+32;
  var slotSize=bsz,slotRad=12;
  var gridGapX=20,gridGapY=20;
  var gridW=2*slotSize+gridGapX;
  var gridX=(W-gridW)/2;

  for(var i=0;i<4;i++){
    var col=i%2,row=Math.floor(i/2);
    var sx=gridX+col*(slotSize+gridGapX);
    var sy=slotZoneY+row*(slotSize+gridGapY+36);
    var ring=h2r(document.getElementById("sring"+i).value);
    var img=slotImgs[i];
    var lbl=document.getElementById("slbl"+i).value;

    ctx.save();
    var ag=ctx.createRadialGradient(sx+slotSize/2,sy+slotSize/2,0,sx+slotSize/2,sy+slotSize/2,slotSize*0.7);
    ag.addColorStop(0,"rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.15)");ag.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle=ag;ctx.fillRect(sx-slotSize*0.25,sy-slotSize*0.25,slotSize*1.5,slotSize*1.5);ctx.restore();

    ctx.save();rrect(ctx,sx-8,sy-8,slotSize+16,slotSize+16,slotRad+8);
    ctx.strokeStyle="rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.35)";
    ctx.lineWidth=1;ctx.shadowColor="rgb("+ring+")";ctx.shadowBlur=20;ctx.stroke();ctx.restore();

    ctx.save();rrect(ctx,sx,sy,slotSize,slotSize,slotRad);
    ctx.fillStyle="rgba(8,3,20,0.7)";ctx.fill();ctx.restore();

    if(!img){
      ctx.save();rrect(ctx,sx,sy,slotSize,slotSize,slotRad);ctx.clip();
      ctx.fillStyle="rgba(8,3,20,0.7)";ctx.fillRect(sx,sy,slotSize,slotSize);
      ctx.setLineDash([6,4]);
      ctx.strokeStyle="rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.25)";ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(sx+slotSize/2,sy+12);ctx.lineTo(sx+slotSize/2,sy+slotSize-12);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+12,sy+slotSize/2);ctx.lineTo(sx+slotSize-12,sy+slotSize/2);ctx.stroke();
      ctx.setLineDash([]);
      ctx.font="500 12px 'Space Grotesk',Arial";ctx.textAlign="center";ctx.textBaseline="middle";
      ctx.fillStyle="rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.4)";
      ctx.fillText("ADD IMAGE",sx+slotSize/2,sy+slotSize/2);
      ctx.restore();
    } else {
      coverRRect(ctx,img,sx,sy,slotSize,slotSize,slotRad);
    }

    ctx.save();rrect(ctx,sx,sy,slotSize,slotSize,slotRad);
    ctx.strokeStyle="rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.9)";
    ctx.lineWidth=2;ctx.shadowColor="rgb("+ring+")";ctx.shadowBlur=16;ctx.stroke();ctx.restore();

    ctx.save();
    var sh=ctx.createLinearGradient(sx,sy,sx+slotSize,sy);
    sh.addColorStop(0,"rgba(255,255,255,0)");sh.addColorStop(0.5,"rgba(255,255,255,0.18)");sh.addColorStop(1,"rgba(255,255,255,0)");
    ctx.strokeStyle=sh;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(sx+slotRad,sy);ctx.lineTo(sx+slotSize-slotRad,sy);ctx.stroke();ctx.restore();

    if(lbl){
      ctx.save();
      ctx.font="600 16px '"+lblf+"',Arial";
      ctx.textAlign="center";ctx.textBaseline="top";
      ctx.shadowColor="rgb("+ring+")";ctx.shadowBlur=8;
      ctx.fillStyle="rgba("+ring[0]+","+ring[1]+","+ring[2]+",0.95)";
      ctx.fillText(lbl,sx+slotSize/2,sy+slotSize+7);ctx.restore();
    }
  }

  // Divider 2
  var gridBottomY=slotZoneY+2*(slotSize+36)+gridGapY+8;
  var div2Y=gridBottomY+10;
  ctx.save();
  var dg2=ctx.createLinearGradient(40,0,W-40,0);
  dg2.addColorStop(0,"rgba(0,0,0,0)");dg2.addColorStop(0.15,"rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.7)");
  dg2.addColorStop(0.5,"rgba(255,255,255,0.85)");dg2.addColorStop(0.85,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.7)");
  dg2.addColorStop(1,"rgba(0,0,0,0)");
  ctx.strokeStyle=dg2;ctx.lineWidth=1;ctx.shadowColor="rgb("+gc2+")";ctx.shadowBlur=8;
  ctx.beginPath();ctx.moveTo(40,div2Y);ctx.lineTo(W-40,div2Y);ctx.stroke();ctx.restore();

  // DISCORD CTA - small, centered
  var ctaY=div2Y+18;
  var ctaH=46;
  var ctaX=120,ctaW=W-240;

  ctx.save();
  rrect(ctx,ctaX,ctaY,ctaW,ctaH,10);
  var ctaBg=ctx.createLinearGradient(ctaX,ctaY,ctaX+ctaW,ctaY);
  ctaBg.addColorStop(0,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.18)");
  ctaBg.addColorStop(0.5,"rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.25)");
  ctaBg.addColorStop(1,"rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.18)");
  ctx.fillStyle=ctaBg;ctx.fill();
  ctx.strokeStyle="rgba("+gc[0]+","+gc[1]+","+gc[2]+",0.8)";
  ctx.lineWidth=1.5;ctx.shadowColor="rgb("+gc+")";ctx.shadowBlur=16;ctx.stroke();ctx.restore();

  // Shimmer on button
  ctx.save();
  var bsh=ctx.createLinearGradient(ctaX,ctaY,ctaX+ctaW,ctaY);
  bsh.addColorStop(0,"rgba(255,255,255,0)");bsh.addColorStop(0.5,"rgba(255,255,255,0.14)");bsh.addColorStop(1,"rgba(255,255,255,0)");
  ctx.strokeStyle=bsh;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(ctaX+10,ctaY+1);ctx.lineTo(ctaX+ctaW-10,ctaY+1);ctx.stroke();ctx.restore();

  // Centered icon + text group
  var centerX=ctaX+ctaW/2;
  ctx.font="700 19px '"+hf+"',serif";
  var btnW=ctx.measureText(ctabtn).width;
  if(showdc){
    var iconSz=22,iconGap=10;
    var groupW=iconSz+iconGap+btnW;
    var gsx=centerX-groupW/2;
    drawDiscordIcon(ctx,gsx+iconSz/2,ctaY+ctaH*0.42,iconSz,"rgb("+gc+")");
    ctx.save();ctx.font="700 19px '"+hf+"',serif";
    ctx.textAlign="left";ctx.textBaseline="middle";
    ctx.shadowColor="rgb("+gc+")";ctx.shadowBlur=12;
    ctx.fillStyle="rgba(245,235,255,0.98)";
    ctx.fillText(ctabtn,gsx+iconSz+iconGap,ctaY+ctaH*0.4);ctx.restore();
  } else {
    ctx.save();ctx.font="700 19px '"+hf+"',serif";
    ctx.textAlign="center";ctx.textBaseline="middle";
    ctx.shadowColor="rgb("+gc+")";ctx.shadowBlur=12;
    ctx.fillStyle="rgba(245,235,255,0.98)";
    ctx.fillText(ctabtn,centerX,ctaY+ctaH*0.4);ctx.restore();
  }
  ctx.save();ctx.font="300 12px 'Josefin Sans',sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.shadowColor="rgba(0,0,0,0.8)";ctx.shadowBlur=6;
  ctx.fillStyle="rgba("+gc2[0]+","+gc2[1]+","+gc2[2]+",0.88)";
  ctx.fillText(ctalnk,centerX,ctaY+ctaH*0.72);ctx.restore();

  drawCornerBrackets(ctx,gc,gc2);
}

function dl(){
  render();
  var a=document.createElement("a");a.download="veilrp_poster.png";
  a.href=document.getElementById("ad").toDataURL("image/png");a.click();
}

render();
</script>
